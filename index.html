<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Book</title>
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1400.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #1e3a8a; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        /* --- SEARCH & FILTER UTILITIES --- */
        .search-filter-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .filter-btn-group { display: flex; gap: 8px; }
        .filter-tab { flex: 1; padding: 8px; background: #e2e8f0; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; color: #475569; cursor: pointer; margin: 0 !important; width: auto !important; }
        .filter-tab.active-tab { background: #2563eb !important; color: white !important; }

        /* --- FOLDER STRIP & SYSTEM LAYOUT --- */
        .folder-engine-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .folder-nav-bar { background: #f1f5f9; padding: 8px 12px; border-radius: 6px; margin-bottom: 15px; display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: bold; color: #475569; }
        .folder-nav-link { color: #2563eb; cursor: pointer; text-decoration: underline; }
        
        /* --- STORAGE COUNTER FOOTER --- */
        .storage-status-bar { background: #f0f9ff; border: 1px solid #bae6fd; padding: 10px 15px; border-radius: 6px; font-size: 13px; font-weight: 600; color: #0369a1; margin-top: 15px; text-align: right; }

        /* --- PREMIUM SECTION HEADING --- */
        .section-heading {
            font-size: 20px;
            color: #1e293b;
            font-weight: 700;
            margin: 30px 0 15px 0;
            padding-left: 12px;
            border-left: 4px solid #2563eb;
            padding-bottom: 8px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
        }

        /* --- BUTTON STATES --- */
        button { 
            background: #2563eb !important; 
            color: #ffffff !important; 
            border: 2px solid #2563eb !important; 
            padding: 12px 20px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            width: 100%; 
            margin-top: 10px; 
            font-weight: bold;
            transition: all 0.05s ease-in-out; 
            outline: none;
            -webkit-tap-highlight-color: transparent; 
        }
        button:hover { background: #1d4ed8 !important; border-color: #1d4ed8 !important; }
        button:active { 
            background: #ffffff !important; 
            color: #2563eb !important; 
            border-color: #2563eb !important;
            transform: scale(0.97); 
        }

        #fileManager, #cloudInterface { display: none; margin-top: 30px; }
        .file-list { list-style: none; padding: 0; }
        
        /* --- FILE & FOLDER ITEM LAYOUT --- */
        .file-item { 
            display: flex; 
            justify-content: space-between; 
            background: #f9fafb; 
            padding: 10px 15px; 
            border: 1px solid #e5e7eb; 
            border-radius: 8px; 
            margin-bottom: 10px; 
            align-items: center; 
        }
        .file-item.folder-row-style {
            background: #f8fafc;
            border-color: #cbd5e1;
            cursor: pointer;
        }
        .file-item.folder-row-style:hover {
            background: #f1f5f9;
        }
        .file-info-zone {
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 55%;
        }
        
        .file-thumbnail {
            width: 42px;
            height: 42px;
            border-radius: 6px;
            object-fit: cover;
            background: #e2e8f0;
            border: 1px solid #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #475569;
            flex-shrink: 0;
        }
        .file-name-text {
            font-size: 14px;
            color: #334155;
            font-weight: 500;
            word-break: break-all;
        }
        
        /* --- COMPACT BUTTONS --- */
        .download-btn { 
            padding: 5px 10px !important; 
            font-size: 12px !important;    
            width: auto !important; 
            margin: 0 !important; 
            border-radius: 4px !important; 
            cursor: pointer; 
            font-weight: 600 !important;
            transition: all 0.05s ease;
            border: none !important;
            -webkit-tap-highlight-color: transparent;
        }
        .download-btn:active {
            background: #ffffff !important;
            color: #111827 !important;
            transform: scale(0.94);
        }

        .btn-cancel-override {
            background: #ef4444 !important; 
            color: #ffffff !important;
            padding: 4px 10px !important; 
            font-size: 12px !important; 
            border-color: #ef4444 !important; 
            width: auto !important; 
            margin: 0 !important;
            font-weight: 600 !important;
            border-radius: 4px !important;
        }

        .upload-zone { border: 2px dashed #cbd5e1; padding: 20px; text-align: center; border-radius: 8px; background: #f8fafc; margin-bottom: 20px; }
        .back-btn { background: #6b7280 !important; border: 2px solid #6b7280 !important; width: auto !important; padding: 8px 15px !important; font-size: 14px !important; float: right; margin: 0; }
        
        .account-bar { background: #e0f2fe; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-group { display: flex; gap: 6px; align-items: center; }

        /* LINEUP PROGRESS BAR STYLES */
        .lineup-progress-container { width: 120px; background-color: #e2e8f0; border-radius: 9999px; overflow: hidden; height: 18px; position: relative; margin-right: 8px; }
        .lineup-progress-bar { background-color: #2563eb; height: 100%; width: 0%; transition: width 0.05s linear; }
        .lineup-progress-text { position: absolute; width: 100%; text-align: center; top: 0; left: 0; font-size: 11px; font-weight: bold; color: #1e293b; line-height: 18px; }

        /* PREVIEW POPUP MODAL (EXPANDED FOR MULTI-MEDIA AUDIO/VIDEO ENGINES) */
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); align-items: center; justify-content: center; flex-direction: column; }
        .modal-content { max-width: 90%; max-height: 70%; border-radius: 8px; box-shadow: 0 5px 15px rgba(255,255,255,0.2); display: none; }
        .close-modal { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; font-weight: bold; cursor: pointer; }
        #modalMediaTitle { color: white; margin-bottom: 15px; font-size: 16px; font-weight: 500; text-align: center; width: 80%; word-wrap: break-word; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="mainDashboardTitle">☁️ Cloud Dashboard</h1>
    
    <div id="loginSection">
        <div class="form-group">
            <label>Username:</label>
            <input type="text" id="userInput" placeholder="Apna username dalein">
        </div>
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="passInput" placeholder="Apna password dalein">
        </div>
        <button id="loginBtn" onclick="handleLogin()">Login to Cloud</button>
    </div>

    <div id="cloudInterface">
        <button class="back-btn" onclick="logout()">Logout</button>
        <h2 id="welcomeText">Welcome !</h2>
        <div class="form-group">
            <label id="selectBookLabel">Select Your Book</label>
            <select id="accountSelect" onchange="switchAccount()">
                <option value="">Select Your Book</option>
                <option value="acc1">Book 1</option>
                <option value="acc2">Book 2</option>
                <option value="acc3">Book 3</option>
                <option value="acc4">Book 4</option>
                <option value="acc5">Book 5</option>
                <option value="acc6">Book 6</option>
                <option value="acc7">Book 7</option>
                <option value="acc8">Book 8</option>
            </select>
        </div>
    </div>

    <div id="fileManager">
        <div class="account-bar">
            <strong id="activeAccountTitle">Connected: None</strong>
        </div>

        <div class="folder-engine-box">
            <div class="form-group">
                <label>Select One</label>
                <select id="uploadFolderTarget" onchange="toggleFolderInputStyle()">
                    <option value="root">Upload</option>
                    <option value="existing">Existing Folder</option>
                    <option value="new">Create New Folder</option>
                </select>
            </div>
            
            <div id="existingFolderContainer" class="form-group" style="display:none;">
                <label>Folder Select Karein:</label>
                <select id="existingFolderSelect"></select>
            </div>

            <div id="newFolderContainer" class="form-group" style="display:none;">
                <label>Naye Folder Ka Naam:</label>
                <input type="text" id="newFolderNameInput" placeholder="Jaise: Music, Videos, Projects">
            </div>
        </div>
        
        <div class="upload-zone">
            <input type="file" id="fileInput" multiple><br><br>
            <button onclick="uploadFiles()" style="width: auto; padding: 8px 20px;">Upload File(s)</button>
        </div>
        
        <!-- NEW SEARCH AND FILTER PANELS -->
        <div class="search-filter-box">
            <input type="text" id="cloudSearchInput" placeholder="Files ya Folders search karein..." oninput="applySearchAndFilters()">
            <div class="filter-btn-group">
                <button class="filter-tab active-tab" id="tabAll" onclick="switchFilterTab('all')">All Files</button>
                <button class="filter-tab" id="tabPhotos" onclick="switchFilterTab('photos')">Photos Only</button>
                <button class="filter-tab" id="tabVideos" onclick="switchFilterTab('videos')">Videos Only</button>
            </div>
        </div>

        <div class="section-heading">Aapki Files</div>
        
        <div class="folder-nav-bar" id="folderPathBar">
            Location: <span class="folder-nav-link" onclick="navigateToFolder('')">Home</span>
        </div>

        <ul id="listFiles" class="file-list"></ul>
        
        <!-- NEW STORAGE MONITOR BAR -->
        <div class="storage-status-bar" id="storageSummaryTracker">Total Files: 0 | Size: 0.00 MB</div>
    </div>
</div>

<!-- DYNAMIC PLAYER MODAL BOX -->
<div id="previewModal" class="modal">
    <span class="close-modal" onclick="closePreview()">&times;</span>
    <div id="modalMediaTitle">File Name</div>
    <img class="modal-content" id="previewImg" src="">
    <video class="modal-content" id="previewVideo" controls style="max-height: 65%; width: auto;"></video>
    <audio class="modal-content" id="previewAudio" controls style="width: 80%; margin-top: 20px;"></audio>
</div>

<script>
const SUPABASE_URL = "https://feqyjfdonfmnompasyge.supabase.co"; 
const SUPABASE_ANON_KEY = "sb_publishable_A5Oi-iBwLfPo2ooQvikwvA_FVfbxE4h";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let s3;
let currentBucket;
let allUserKeys = {}; 
let activeUploadRequests = {}; 

let currentDirectoryPath = ""; 
let uniqueDetectedFoldersList = new Set();
let localFilesCachedMemoryList = []; // Memory cache layer to handle high speed local searches
let currentSelectedActiveTabType = "all"; 

function forceApplyTextChanges() {
    const mainTitle = document.getElementById('mainDashboardTitle');
    const welcome = document.getElementById('welcomeText');
    const labelBook = document.getElementById('selectBookLabel');
    
    if(mainTitle) mainTitle.innerHTML = "☁️ Cloud Dashboard";
    if(welcome) welcome.innerHTML = "Welcome !";
    if(labelBook) labelBook.innerHTML = "Select Your Book";
}

window.onload = function() {
    forceApplyTextChanges();
};

async function handleLogin() {
    const user = document.getElementById('userInput').value;
    const pass = document.getElementById('passInput').value;

    if(!user || !pass) { alert("Dono fields bharna zaroori hai!"); return; }

    const { data, error } = await supabaseClient
        .from('cloud_users')
        .select('*')
        .eq('username', user)
        .eq('password', pass)
        .single();

    if (error || !data) {
        alert("Username ya Password galat hai!");
        console.error(error);
    } else {
        allUserKeys = data.storj_keys;
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('cloudInterface').style.display = 'block';
        forceApplyTextChanges();
    }
}

function switchAccount() {
    const selectedAcc = document.getElementById('accountSelect').value;
    if(!selectedAcc) {
        document.getElementById('fileManager').style.display = 'none';
        return;
    }

    const accDetails = allUserKeys[selectedAcc];
    currentBucket = accDetails.bucket;

    AWS.config.update({
        accessKeyId: accDetails.accessKey,
        secretAccessKey: accDetails.secretKey,
        endpoint: 'https://gateway.storjshare.io',
        s3ForcePathStyle: true,
        signatureVersion: 'v4'
    });

    s3 = new AWS.S3();
    
    const selectedText = document.getElementById('accountSelect').options[document.getElementById('accountSelect').selectedIndex].text;
    document.getElementById('activeAccountTitle').innerText = "Connected: " + selectedText;
    
    document.getElementById('fileManager').style.display = 'block';
    currentDirectoryPath = ""; 
    loadFiles();
}

function toggleFolderInputStyle() {
    const type = document.getElementById('uploadFolderTarget').value;
    document.getElementById('existingFolderContainer').style.display = (type === 'existing') ? 'block' : 'none';
    document.getElementById('newFolderContainer').style.display = (type === 'new') ? 'block' : 'none';
}

function updateFolderDropdownUI() {
    const dropdown = document.getElementById('existingFolderSelect');
    if(!dropdown) return;
    dropdown.innerHTML = "";
    
    if(uniqueDetectedFoldersList.size === 0) {
        dropdown.innerHTML = "<option value=''>-- Koi Folder Nahi Mila --</option>";
        return;
    }
    
    uniqueDetectedFoldersList.forEach(folder => {
        const opt = document.createElement('option');
        opt.value = folder;
        opt.innerText = folder;
        dropdown.appendChild(opt);
    });
}

function navigateToFolder(path) {
    currentDirectoryPath = path;
    
    const pathBar = document.getElementById('folderPathBar');
    if(path === "") {
        pathBar.innerHTML = `Location: <span class="folder-nav-link" onclick="navigateToFolder('')">Home</span>`;
    } else {
        const cleanDisplayFolder = path.replace(/\/$/, "");
        pathBar.innerHTML = `Location: <span class="folder-nav-link" onclick="navigateToFolder('')">Home</span> / <strong style="color:#1e293b;">${cleanDisplayFolder}</strong>`;
    }
    
    // Clear search bar on folder change
    document.getElementById('cloudSearchInput').value = "";
    renderFilesFromCache();
}

function isImageFile(fileName) {
    const ext = fileName.split('.').pop().toLowerCase();
    return ['jpg', 'jpeg', 'png', 'gif', 'webp', 'bmp'].includes(ext);
}

function isVideoFile(fileName) {
    const ext = fileName.split('.').pop().toLowerCase();
    return ['mp4', 'mkv', 'webm', 'avi', 'mov'].includes(ext);
}

function isAudioFile(fileName) {
    const ext = fileName.split('.').pop().toLowerCase();
    return ['mp3', 'wav', 'ogg', 'm4a', 'aac', 'flac'].includes(ext);
}

function switchFilterTab(tabType) {
    currentSelectedActiveTabType = tabType;
    document.querySelectorAll('.filter-tab').forEach(btn => btn.classList.remove('active-tab'));
    
    if(tabType === 'all') document.getElementById('tabAll').classList.add('active-tab');
    if(tabType === 'photos') document.getElementById('tabPhotos').classList.add('active-tab');
    if(tabType === 'videos') document.getElementById('tabVideos').classList.add('active-tab');
    
    renderFilesFromCache();
}

function loadFiles() {
    if (Object.keys(activeUploadRequests).length > 0) {
        return; 
    }

    s3.listObjectsV2({ Bucket: currentBucket }, function(err, data) {
        if (err) {
            alert("Storj connect karne me error aaya!");
            console.log(err);
            return;
        }
        // Cache full payload raw array to enable client side high speed filters
        localFilesCachedMemoryList = data.Contents || [];
        renderFilesFromCache();
    });
}

// FULL MULTI-FUNCTIONAL CLIENT RENDERING MATRIX FOR SEARCH & SPACE EXTRACTION
function renderFilesFromCache() {
    const fileList = document.getElementById('listFiles');
    const searchQuery = document.getElementById('cloudSearchInput').value.toLowerCase().trim();
    
    const activeProgressRows = [];
    document.querySelectorAll('.uploading-temp-item').forEach(item => {
        activeProgressRows.push(item.outerHTML);
    });
    fileList.innerHTML = activeProgressRows.join('');

    uniqueDetectedFoldersList.clear();
    const itemsToRender = [];
    const trackingSubFoldersInCurrentDir = new Set();
    
    let renderedFilesTotalCount = 0;
    let renderedFilesTotalByteSize = 0;

    localFilesCachedMemoryList.forEach(function(content) {
        const key = content.Key;
        
        // Setup global folder map data layer tracking
        if(key.includes('/')) {
            const parts = key.split('/');
            const baseFolderName = parts[0];
            uniqueDetectedFoldersList.add(baseFolderName);
            
            if(currentDirectoryPath === "") {
                trackingSubFoldersInCurrentDir.add(baseFolderName);
            } else if(key.startsWith(currentDirectoryPath)) {
                const relativePath = key.substring(currentDirectoryPath.length);
                if(relativePath.length > 0) {
                    itemsToRender.push({ type: 'file', data: content, displayKey: relativePath });
                }
            }
        } else {
            if(currentDirectoryPath === "") {
                itemsToRender.push({ type: 'file', data: content, displayKey: key });
            }
        }
    });

    updateFolderDropdownUI();

    // Render folder rows (filtered by search query if applicable)
    trackingSubFoldersInCurrentDir.forEach(folderName => {
        if(searchQuery !== "" && !folderName.toLowerCase().includes(searchQuery)) return;
        
        // Skip directory rows if user is hunting exclusively inside specific file types tabs
        if(currentSelectedActiveTabType !== 'all') return;

        const li = document.createElement('li');
        li.className = 'file-item folder-row-style';
        li.onclick = function() { navigateToFolder(folderName + "/"); };
        li.innerHTML = `
            <div class="file-info-zone">
                <div class="file-thumbnail" style="background:#f1f5f9; font-size:11px; font-weight:bold;">DIR</div>
                <div class="file-name-text" style="font-weight:bold; color:#1e293b;">
                    ${folderName} <br>
                    <span style="font-size:11px; color:#64748b; font-weight:normal;">Folder / Directory</span>
                </div>
            </div>
            <div>
                <strong style="color:#2563eb; font-size:13px; padding-right:10px;">Open ➔</strong>
            </div>
        `;
        fileList.appendChild(li);
    });

    // Process file lists rendering layer
    itemsToRender.forEach(function(item) {
        const content = item.data;
        const originalKey = content.Key;
        const displayLabel = item.displayKey;
        
        // 1. Text Search Box filtration logic execution
        if(searchQuery !== "" && !displayLabel.toLowerCase().includes(searchQuery)) return;
        
        // 2. Type Tab filters filtration logic execution
        if(currentSelectedActiveTabType === 'photos' && !isImageFile(originalKey)) return;
        if(currentSelectedActiveTabType === 'videos' && !isVideoFile(originalKey)) return;

        // Compile statistics counter variables values
        renderedFilesTotalCount++;
        renderedFilesTotalByteSize += content.Size;

        const url = s3.getSignedUrl('getObject', { Bucket: currentBucket, Key: originalKey, Expires: 3600 });
        
        const li = document.createElement('li');
        li.className = 'file-item';
        
        let typeIconLabel = "FILE";
        if(isImageFile(originalKey)) typeIconLabel = "IMG";
        if(isVideoFile(originalKey)) typeIconLabel = "VIDEO";
        if(isAudioFile(originalKey)) typeIconLabel = "AUDIO";

        let iconOrThumbnailHTML = `<div class="file-thumbnail">${typeIconLabel}</div>`;
        if (isImageFile(originalKey)) {
            iconOrThumbnailHTML = `<img class="file-thumbnail" src="${url}" alt="preview">`;
        }

        li.innerHTML = `
            <div class="file-info-zone">
                ${iconOrThumbnailHTML}
                <div class="file-name-text">
                    ${displayLabel} <br>
                    <span style="font-size: 11px; color: #64748b;">(${(content.Size/1024/1024).toFixed(2)} MB)</span>
                </div>
            </div>
            <div class="btn-group">
                <button class="download-btn" style="background: #3b82f6;" onclick="event.stopPropagation(); previewFileDirectly('${originalKey}')">View</button>
                <a href="${url}" download="${displayLabel}" onclick="event.stopPropagation();">
                    <button class="download-btn" style="background: #10b981;">Download</button>
                </a>
                <button class="download-btn" style="background: #ef4444;" onclick="event.stopPropagation(); deleteFile('${originalKey}')">Delete</button>
            </div>
        `;
        fileList.appendChild(li);
    });

    // Update Live dynamic Storage status bar text
    const convertedMegaBytes = (renderedFilesTotalByteSize / 1024 / 1024).toFixed(2);
    document.getElementById('storageSummaryTracker').innerText = `Total Files: ${renderedFilesTotalCount} | Size: ${convertedMegaBytes} MB`;

    if (fileList.innerHTML === "") {
        fileList.innerHTML = '<li>Locker khali hai ya matches nahi mile.</li>';
    }
}

function applySearchAndFilters() {
    renderFilesFromCache();
}

// EXTENDED UNIVERSAL STREAMING MULTI-MEDIA VIEW SYSTEM
function previewFileDirectly(fileKey) {
    const modal = document.getElementById('previewModal');
    const modalImg = document.getElementById('previewImg');
    const modalVid = document.getElementById('previewVideo');
    const modalAud = document.getElementById('previewAudio');
    const modalTitle = document.getElementById('modalMediaTitle');
    
    // Completely clear out old streams from previous views initialization
    modalImg.src = ""; modalImg.style.display = "none";
    modalVid.src = ""; modalVid.style.display = "none";
    modalAud.src = ""; modalAud.style.display = "none";
    
    const shortTitleClean = fileKey.split('/').pop();
    modalTitle.innerText = shortTitleClean;
    
    s3.getObject({ Bucket: currentBucket, Key: fileKey }, function(err, data) {
        if (err) {
            alert("File preview load karne me dikkat aayi!");
            console.log(err);
            return;
        }
        
        const blob = new Blob([data.Body], { type: data.ContentType });
        const blobUrl = URL.createObjectURL(blob);
        modal.style.display = "flex";

        if(isImageFile(fileKey)) {
            modalImg.src = blobUrl;
            modalImg.style.display = "block";
        } else if(isVideoFile(fileKey)) {
            modalVid.src = blobUrl;
            modalVid.style.display = "block";
            modalVid.load();
            modalVid.play().catch(e => console.log("Autoplay block text wrapper alert:", e));
        } else if(isAudioFile(fileKey)) {
            modalAud.src = blobUrl;
            modalAud.style.display = "block";
            modalAud.load();
            modalAud.play().catch(e => console.log("Autoplay block text wrapper alert:", e));
        } else {
            // Fallback strategy alert for generic raw files download trigger requests
            modalTitle.innerText = shortTitleClean + " (Preview not available, download to view)";
            modalImg.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='1' stroke-linecap='round' stroke-linejoin='round'><path d='M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z'></path><polyline points='14 2 14 8 20 8'></polyline></svg>";
            modalImg.style.display = "block";
        }
    });
}

function closePreview() {
    const modalVid = document.getElementById('previewVideo');
    const modalAud = document.getElementById('previewAudio');
    
    // Explicitly kill resource hooks inside runtime execution streams
    if(modalVid) modalVid.pause();
    if(modalAud) modalAud.pause();
    
    document.getElementById('previewModal').style.display = "none";
}

function cancelUpload(uploadId) {
    const request = activeUploadRequests[uploadId];
    if (request) {
        request.abort(); 
        delete activeUploadRequests[uploadId];
        const row = document.getElementById(uploadId);
        if (row) row.remove();
        
        if (Object.keys(activeUploadRequests).length === 0) {
            loadFiles();
        }
    }
}

function deleteFile(fileKey) {
    if (Object.keys(activeUploadRequests).length > 0) {
        alert("Kripya pehle chal rahe uploads ko poora hone edin!");
        return;
    }
    if(confirm("Kya aap sach me is file ko delete karna chahte hain?")) {
        s3.deleteObject({ Bucket: currentBucket, Key: fileKey }, function(err, data) {
            if (err) { alert("Delete karne me error aaya!"); console.log(err); } 
            else { 
                // Immediate refresh mapping
                s3.listObjectsV2({ Bucket: currentBucket }, function(err, data) {
                    if(!err) { localFilesCachedMemoryList = data.Contents || []; renderFilesFromCache(); }
                });
            }
        });
    }
}

function uploadFiles() {
    const fileInput = document.getElementById('fileInput');
    const files = fileInput.files;
    if (files.length === 0) { alert("Pehle koi file select karein!"); return; }

    const fileList = document.getElementById('listFiles');
    if(fileList.innerHTML.includes('Locker khali hai')) {
        fileList.innerHTML = '';
    }

    const folderStrategy = document.getElementById('uploadFolderTarget').value;
    let targetPathPrefix = "";

    if (folderStrategy === 'existing') {
        const selectedExisting = document.getElementById('existingFolderSelect').value;
        if(selectedExisting) {
            targetPathPrefix = selectedExisting + "/";
        }
    } else if (folderStrategy === 'new') {
        let rawNewFolderName = document.getElementById('newFolderNameInput').value.trim();
        rawNewFolderName = rawNewFolderName.replace(/[\/\\?%*:|"<>. ]/g, "_");
        if(!rawNewFolderName) {
            alert("Kripya naye folder ka naam sahi se dalein!");
            return;
        }
        targetPathPrefix = rawNewFolderName + "/";
    } else {
        if(currentDirectoryPath !== "") {
            targetPathPrefix = currentDirectoryPath;
        }
    }

    Array.from(files).forEach((file) => {
        const uploadId = 'upload_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
        const cloudUploadFinalKey = targetPathPrefix + file.name;

        const tempLi = document.createElement('li');
        tempLi.className = 'file-item uploading-temp-item';
        tempLi.id = uploadId;
        
        tempLi.innerHTML = `
            <div class="file-info-zone">
                <div class="file-thumbnail" style="color: #2563eb; font-size:11px; font-weight:bold;">LOAD</div>
                <div class="file-name-text" style="color: #2563eb; font-weight: bold;">
                    Uploading: ${file.name}
                </div>
            </div>
            <div class="btn-group">
                <div class="lineup-progress-container">
                    <div id="bar_${uploadId}" class="lineup-progress-bar" style="width: 0%;"></div>
                    <div id="text_${uploadId}" class="lineup-progress-text">0%</div>
                </div>
                <button class="btn-cancel-override" id="btn_click_${uploadId}">Cancel</button>
            </div>
        `;
        
        fileList.insertBefore(tempLi, fileList.firstChild);

        const targetBtn = document.getElementById('btn_click_' + uploadId);
        if(targetBtn) {
            targetBtn.innerText = "Cancel"; 
            targetBtn.onclick = function() { cancelUpload(uploadId); };
        }

        const options = { 
            queueSize: 4,          
            partSize: 5 * 1024 * 1024 
        };

        const currentUploadRequest = s3.upload({ Bucket: currentBucket, Key: cloudUploadFinalKey, Body: file }, options, function(err, data) {
            delete activeUploadRequests[uploadId];
            const rowToRemove = document.getElementById(uploadId);
            if (rowToRemove) rowToRemove.remove();

            if (err) { 
                if(err.code !== 'RequestAbortedError') {
                    alert("Upload failed for: " + file.name);
                    console.log(err);
                }
            }
            
            if (Object.keys(activeUploadRequests).length === 0) {
                document.getElementById('newFolderNameInput').value = "";
                document.getElementById('uploadFolderTarget').value = "root";
                toggleFolderInputStyle();
                
                // Re-sync memory map cache instantly upon complete payload stream uploads
                s3.listObjectsV2({ Bucket: currentBucket }, function(err, data) {
                    if(!err) { localFilesCachedMemoryList = data.Contents || []; renderFilesFromCache(); }
                });
            }
        });

        activeUploadRequests[uploadId] = currentUploadRequest;

        currentUploadRequest.on('httpUploadProgress', function(progress) {
            const percentage = Math.round((progress.loaded / progress.total) * 100);
            const specificBar = document.getElementById('bar_' + uploadId);
            const specificText = document.getElementById('text_' + uploadId);
            if(specificBar && specificText) {
                specificBar.style.width = percentage + '%';
                specificText.innerText = percentage + '%';
            }
        });
    });

    fileInput.value = ''; 
}

function logout() {
    Object.keys(activeUploadRequests).forEach(id => cancelUpload(id));
    document.getElementById('loginSection').style.display = 'block';
    document.getElementById('cloudInterface').style.display = 'none';
    document.getElementById('fileManager').style.display = 'none';
    document.getElementById('userInput').value = '';
    document.getElementById('passInput').value = '';
    document.getElementById('accountSelect').value = '';
}
</script>
</body>
</html>
