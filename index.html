<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Book</title>
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1400.0.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
        h1 { text-align: center; color: #1e3a8a; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        /* --- SEARCH & FILTER UTILITIES --- */
        .search-filter-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .filter-btn-group { display: flex; gap: 8px; }
        .filter-tab { flex: 1; padding: 8px; background: #e2e8f0; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; color: #475569; cursor: pointer; margin: 0 !important; width: auto !important; }
        .filter-tab.active-tab { background: #2563eb !important; color: white !important; }

        /* --- FOLDER STRIP & SYSTEM LAYOUT --- */
        .folder-engine-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .folder-nav-bar { background: #f1f5f9; padding: 8px 12px; border-radius: 6px; margin-bottom: 15px; display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: bold; color: #475569; }
        .folder-nav-link { color: #2563eb; cursor: pointer; text-decoration: underline; }
        
        /* --- STORAGE COUNTER FOOTER --- */
        .storage-status-bar { background: #f0f9ff; border: 1px solid #bae6fd; padding: 10px 15px; border-radius: 6px; font-size: 13px; font-weight: 600; color: #0369a1; margin-top: 15px; text-align: right; }

        /* --- PREMIUM SECTION HEADING --- */
        .section-heading { font-size: 20px; color: #1e293b; font-weight: 700; margin: 30px 0 15px 0; padding-left: 12px; border-left: 4px solid #2563eb; padding-bottom: 8px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; }

        /* --- BUTTON STATES --- */
        button { background: #2563eb !important; color: #ffffff !important; border: 2px solid #2563eb !important; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 10px; font-weight: bold; transition: all 0.05s ease-in-out; outline: none; -webkit-tap-highlight-color: transparent; }
        button:hover { background: #1d4ed8 !important; border-color: #1d4ed8 !important; }
        button:active { background: #ffffff !important; color: #2563eb !important; border-color: #2563eb !important; transform: scale(0.97); }

        #fileManager, #cloudInterface { display: none; margin-top: 30px; }
        .file-list { list-style: none; padding: 0; }
        
        /* --- FILE & FOLDER ITEM LAYOUT --- */
        .file-item { display: flex; justify-content: space-between; background: #f9fafb; padding: 12px 15px; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 10px; align-items: center; position: relative; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
        .file-item:hover { background: #f1f5f9; border-color: #cbd5e1; }
        .file-item.folder-row-style { background: #f8fafc; border-color: #cbd5e1; }
        .file-item.folder-row-style:hover { background: #f1f5f9; }
        .file-info-zone { display: flex; align-items: center; gap: 12px; max-width: 75%; }
        
        .folder-svg-icon { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; fill: #3b82f6; }
        .file-thumbnail { width: 42px; height: 42px; border-radius: 6px; object-fit: cover; background: #e2e8f0; border: 1px solid #cbd5e1; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: #475569; flex-shrink: 0; }
        .file-name-text { font-size: 14px; color: #334155; font-weight: 500; word-break: break-all; }
        
        /* MODERN 3-DOT MENU STYLES */
        .three-dot-btn { background: transparent !important; border: none !important; color: #64748b !important; font-size: 22px !important; font-weight: bold !important; cursor: pointer; width: auto !important; padding: 0 8px !important; margin: 0 !important; border-radius: 50%; display: flex; align-items: center; justify-content: center; height: 32px; width: 32px; transition: background 0.2s; }
        .three-dot-btn:hover { background: #cbd5e1 !important; color: #1e293b !important; }
        
        /* DROP DOWN MODAL MENU LAYER */
        .context-menu-dropdown { display: none; position: absolute; right: 15px; top: 45px; background: white; border: 1px solid #cbd5e1; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 999; min-width: 150px; overflow: hidden; padding: 4px 0; }
        .context-menu-item { padding: 10px 14px; font-size: 13px; font-weight: 500; color: #334155; cursor: pointer; display: flex; align-items: center; transition: background 0.15s; }
        .context-menu-item:hover { background: #f1f5f9; color: #2563eb; }
        .context-menu-item.delete-action:hover { background: #fef2f2; color: #ef4444; }

        .btn-cancel-override { background: #ef4444 !important; color: #ffffff !important; padding: 4px 10px !important; font-size: 12px !important; border-color: #ef4444 !important; width: auto !important; margin: 0 !important; font-weight: 600 !important; border-radius: 4px !important; }
        .upload-zone { border: 2px dashed #cbd5e1; padding: 20px; text-align: center; border-radius: 8px; background: #f8fafc; margin-bottom: 20px; }
        .back-btn { background: #6b7280 !important; border: 2px solid #6b7280 !important; width: auto !important; padding: 8px 15px !important; font-size: 14px !important; float: right; margin: 0; }
        .account-bar { background: #e0f2fe; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }

        /* PASSWORD PANEL STYLES */
        .password-engine-box { background: #fffbeb; border: 1px solid #fde68a; padding: 15px; border-radius: 8px; margin-top: 25px; display: none; }

        .lineup-progress-container { width: 120px; background-color: #e2e8f0; border-radius: 9999px; overflow: hidden; height: 18px; position: relative; margin-right: 8px; }
        .lineup-progress-bar { background-color: #2563eb; height: 100%; width: 0%; transition: width 0.05s linear; }
        .lineup-progress-text { position: absolute; width: 100%; text-align: center; top: 0; left: 0; font-size: 11px; font-weight: bold; color: #1e293b; line-height: 18px; }

        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); align-items: center; justify-content: center; flex-direction: column; }
        .modal-content { max-width: 90%; max-height: 70%; border-radius: 8px; box-shadow: 0 5px 15px rgba(255,255,255,0.2); display: none; }
        .close-modal { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; font-weight: bold; cursor: pointer; }
        #modalMediaTitle { color: white; margin-bottom: 15px; font-size: 16px; font-weight: 500; text-align: center; width: 80%; word-wrap: break-word; }
    </style>
</head>
<body>

<div class="container" onclick="closeAllOpenContextMenus()">
    <h1 id="mainDashboardTitle">☁️ Cloud Dashboard</h1>
    
    <div id="loginSection">
        <div class="form-group">
            <label>Username:</label>
            <input type="text" id="userInput" placeholder="Username">
        </div>
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="passInput" placeholder="Password">
        </div>
        <button id="loginBtn" onclick="handleLogin()">Login to Cloud</button>
    </div>

    <div id="cloudInterface">
        <button class="back-btn" onclick="logout()">Logout</button>
        <h2 id="welcomeText">Welcome !</h2>
        <div class="form-group">
            <label id="selectBookLabel">Select Your Book</label>
            <select id="accountSelect" onchange="switchAccount()">
                <option value="">Select Your Book</option>
                <option value="acc1">Book 1</option>
            </select>
        </div>
    </div>

    <div id="fileManager">
        <div class="account-bar">
            <strong id="activeAccountTitle">Connected: None</strong>
            <button onclick="togglePasswordPanel()" style="width:auto; margin:0; padding:6px 12px; font-size:12px; background:#d97706 !important; border-color:#d97706 !important;">Key Settings</button>
        </div>

        <div class="password-engine-box" id="passwordSettingsPanel">
            <h3 style="margin-top:0; color:#b45309; font-size:16px;">🔑 Credentials Manager</h3>
            <div class="form-group">
                <label style="font-size:13px; color:#b45309;">Naya Username Likhein:</label>
                <input type="text" id="newUsernameDBInput" placeholder="carvam">
            </div>
            <div class="form-group">
                <label style="font-size:13px; color:#b45309;">Naya Password Likhein:</label>
                <input type="password" id="newPasswordDBInput" placeholder="Naya password dalein">
            </div>
            <button onclick="updateDatabaseCredentials()" style="background:#b45309 !important; border-color:#b45309 !important; padding:8px; font-size:14px;">Update Login Info</button>
        </div>

        <div class="folder-engine-box">
            <div class="form-group">
                <label>Select One</label>
                <select id="uploadFolderTarget" onchange="toggleFolderInputStyle()">
                    <option value="root">Upload</option>
                    <option value="existing">Existing Folder</option>
                    <option value="new">Create New Folder</option>
                </select>
            </div>
            
            <div id="existingFolderContainer" class="form-group" style="display:none;">
                <label>Folder Select Karein:</label>
                <select id="existingFolderSelect"></select>
            </div>

            <div id="newFolderContainer" class="form-group" style="display:none;">
                <label>Naye Folder Ka Naam:</label>
                <input type="text" id="newFolderNameInput" placeholder="Jaise: Music, Videos, Projects">
            </div>
        </div>
        
        <div class="upload-zone">
            <input type="file" id="fileInput" multiple><br><br>
            <button onclick="uploadFiles()" style="width: auto; padding: 8px 20px;">Upload File(s)</button>
        </div>
        
        <div class="search-filter-box">
            <input type="text" id="cloudSearchInput" placeholder="Files ya Folders search karein..." oninput="applySearchAndFilters()">
            <div class="filter-btn-group">
                <button class="filter-tab active-tab" id="tabAll" onclick="switchFilterTab('all')">All Files</button>
                <button class="filter-tab" id="tabPhotos" onclick="switchFilterTab('photos')">Photos Only</button>
                <button class="filter-tab" id="tabVideos" onclick="switchFilterTab('videos')">Videos Only</button>
            </div>
        </div>

        <div class="section-heading">Aapki Files</div>
        
        <div class="folder-nav-bar" id="folderPathBar">
            Location: <span class="folder-nav-link" onclick="navigateToFolder('')">Home</span>
        </div>

        <ul id="listFiles" class="file-list"></ul>
        
        <div class="storage-status-bar" id="storageSummaryTracker">Total Files: 0 | Size: 0.00 MB</div>
    </div>
</div>

<div id="previewModal" class="modal">
    <span class="close-modal" onclick="closePreview()">&times;</span>
    <div id="modalMediaTitle">File Name</div>
    <img class="modal-content" id="previewImg" src="">
    <video class="modal-content" id="previewVideo" controls style="max-height: 65%; width: auto;"></video>
    <audio class="modal-content" id="previewAudio" controls style="width: 80%; margin-top: 20px;"></audio>
</div>

<script>
// ⚠️ ATTENTION: YAHAN APNA FIREBASE DATABASE URL DALO JO COPIED HAI!
const FIREBASE_DB_URL = "https://JAISA_PEHLE_STEP_ME_COPY_KIYA_THA.firebaseio.com/";

firebase.initializeApp({ databaseURL: FIREBASE_DB_URL });
const database = firebase.database();

let s3;
let currentBucket;
let allUserKeys = {}; 
let activeUploadRequests = {}; 
let currentDirectoryPath = ""; 
let uniqueDetectedFoldersList = new Set();
let localFilesCachedMemoryList = []; 
let currentSelectedActiveTabType = "all"; 

function forceApplyTextChanges() {
    document.getElementById('mainDashboardTitle').innerHTML = "☁️ Cloud Dashboard";
    document.getElementById('welcomeText').innerHTML = "Welcome !";
    document.getElementById('selectBookLabel').innerHTML = "Select Your Book";
}

window.onload = function() {
    forceApplyTextChanges();
    // Pre-seed setup structural verification schema if target database node layout empty
    database.ref("cloud_users/settings").once("value", function(snapshot) {
        if(!snapshot.exists()) {
            database.ref("cloud_users/settings").set({
                username: "carvam",
                password: "carvam8960",
                storj_keys: {
                    "acc1": {
                        "bucket": "ashok-cloud",
                        "accessKey": "0057ec09e73b22b0000000001",
                        "secretKey": "00539ba4fa5f5ca98380dbca08aeb41"
                    }
                }
            });
        }
    });
};

// FIREBASE FAST HANDSHAKE LOGIN ENGINE
function handleLogin() {
    const user = document.getElementById('userInput').value.trim();
    const pass = document.getElementById('passInput').value.trim();

    if(!user || !pass) { alert("Dono fields bharna zaroori hai!"); return; }

    database.ref("cloud_users/settings").once("value", function(snapshot) {
        const data = snapshot.val();
        if(data && data.username === user && data.password === pass) {
            allUserKeys = data.storj_keys;
            document.getElementById('newUsernameDBInput').value = data.username;
            document.getElementById('newPasswordDBInput').value = data.password;

            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('cloudInterface').style.display = 'block';
            forceApplyTextChanges();
        } else {
            alert("Username ya Password galat hai!");
        }
    }, function(error) {
        alert("Firebase Config Error! Check database security rules.");
    });
}

function togglePasswordPanel() {
    const panel = document.getElementById('passwordSettingsPanel');
    panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
}

// UPDATE CREDENTIALS LIVE ON FIREBASE CLOUD REALTIME CONTEXT
function updateDatabaseCredentials() {
    const targetUser = document.getElementById('newUsernameDBInput').value.trim();
    const targetPass = document.getElementById('newPasswordDBInput').value.trim();

    if(!targetUser || !targetPass) { alert("Fields khali nahi chhod sakte!"); return; }

    database.ref("cloud_users/settings").update({
        username: targetUser,
        password: targetPass
    }, function(error) {
        if(error) { alert("Update failed!"); }
        else {
            alert("🔥 Success: Credentials manager synced directly over Firebase Cloud system!");
            document.getElementById('passwordSettingsPanel').style.display = 'none';
        }
    });
}

function switchAccount() {
    const selectedAcc = document.getElementById('accountSelect').value;
    if(!selectedAcc) { document.getElementById('fileManager').style.display = 'none'; return; }

    const accDetails = allUserKeys[selectedAcc];
    currentBucket = accDetails.bucket;

    AWS.config.update({
        accessKeyId: accDetails.accessKey,
        secretAccessKey: accDetails.secretKey,
        endpoint: 'https://gateway.storjshare.io',
        s3ForcePathStyle: true,
        signatureVersion: 'v4'
    });

    s3 = new AWS.S3();
    const selectedText = document.getElementById('accountSelect').options[document.getElementById('accountSelect').selectedIndex].text;
    document.getElementById('activeAccountTitle').innerText = "Connected: " + selectedText;
    
    document.getElementById('fileManager').style.display = 'block';
    currentDirectoryPath = ""; 
    loadFiles();
}

function toggleFolderInputStyle() {
    const type = document.getElementById('uploadFolderTarget').value;
    document.getElementById('existingFolderContainer').style.display = (type === 'existing') ? 'block' : 'none';
    document.getElementById('newFolderContainer').style.display = (type === 'new') ? 'block' : 'none';
}

function updateFolderDropdownUI() {
    const dropdown = document.getElementById('existingFolderSelect');
    if(!dropdown) return; dropdown.innerHTML = "";
    if(uniqueDetectedFoldersList.size === 0) { dropdown.innerHTML = "<option value=''>-- Koi Folder Nahi Mila --</option>"; return; }
    uniqueDetectedFoldersList.forEach(folder => {
        const opt = document.createElement('option'); opt.value = folder; opt.innerText = folder; dropdown.appendChild(opt);
    });
}

function navigateToFolder(path) {
    currentDirectoryPath = path;
    const pathBar = document.getElementById('folderPathBar');
    if(path === "") { pathBar.innerHTML = `Location: <span class="folder-nav-link" onclick="navigateToFolder('')">Home</span>`; } 
    else { pathBar.innerHTML = `Location: <span class="folder-nav-link" onclick="navigateToFolder('')">Home</span> / <strong style="color:#1e293b;">${path.replace(/\/$/, "")}</strong>`; }
    document.getElementById('cloudSearchInput').value = "";
    renderFilesFromCache();
}

function isImageFile(fileName) { const ext = fileName.split('.').pop().toLowerCase(); return ['jpg', 'jpeg', 'png', 'gif', 'webp', 'bmp'].includes(ext); }
function isVideoFile(fileName) { const ext = fileName.split('.').pop().toLowerCase(); return ['mp4', 'mkv', 'webm', 'avi', 'mov'].includes(ext); }
function isAudioFile(fileName) { const ext = fileName.split('.').pop().toLowerCase(); return ['mp3', 'wav', 'ogg', 'm4a', 'aac', 'flac'].includes(ext); }

function switchFilterTab(tabType) {
    currentSelectedActiveTabType = tabType;
    document.querySelectorAll('.filter-tab').forEach(btn => btn.classList.remove('active-tab'));
    if(tabType === 'all') document.getElementById('tabAll').classList.add('active-tab');
    if(tabType === 'photos') document.getElementById('tabPhotos').classList.add('active-tab');
    if(tabType === 'videos') document.getElementById('tabVideos').classList.add('active-tab');
    renderFilesFromCache();
}

function loadFiles() {
    if (Object.keys(activeUploadRequests).length > 0) return;
    s3.listObjectsV2({ Bucket: currentBucket }, function(err, data) {
        if (err) { alert("Storj connect karne me error aaya!"); return; }
        localFilesCachedMemoryList = data.Contents || [];
        renderFilesFromCache();
    });
}

function toggleContextMenu(event, menuId) { event.stopPropagation(); const targetMenu = document.getElementById(menuId); const wasOpen = targetMenu.style.display === "block"; closeAllOpenContextMenus(); if (!wasOpen) targetMenu.style.display = "block"; }
function closeAllOpenContextMenus() { document.querySelectorAll('.context-menu-dropdown').forEach(menu => { menu.style.display = "none"; }); }

function runRenameEngine(oldKey, isFolder = false) {
    closeAllOpenContextMenus();
    const cleanOldName = oldKey.split('/').filter(Boolean).pop();
    const newName = prompt("Rename Karein:", cleanOldName);
    if(!newName || newName.trim() === "" || newName === cleanOldName) return;
    let newKey = isFolder ? newName.trim().replace(/[\/\\?%*:|"<>. ]/g, "_") + "/" : oldKey.split('/').slice(0,-1).concat(newName.trim()).join('/');
    executeS3CopyMoveOperation(oldKey, newKey, true);
}

function runShareEngine(fileKey) { closeAllOpenContextMenus(); const url = s3.getSignedUrl('getObject', { Bucket: currentBucket, Key: fileKey, Expires: 86400 }); navigator.clipboard.writeText(url).then(() => { alert("Link copied!"); }); }
function runFileInfoEngine(key, sizeBytes) { closeAllOpenContextMenus(); alert(`📄 Size: ${(sizeBytes/1024/1024).toFixed(2)} MB\nPath: ${key}`); }
function runFolderInfoEngine(folderName) { closeAllOpenContextMenus(); let count = 0; let size = 0; localFilesCachedMemoryList.forEach(item => { if(item.Key.startsWith(folderName + "/")) { count++; size += item.Size; } }); alert(`📁 Folder: ${folderName}\nItems: ${count}`); }

function runMoveCopyEngine(oldKey, operationMode) {
    closeAllOpenContextMenus(); let destinationFolder = prompt("Target folder name:"); if(destinationFolder === null) return;
    destinationFolder = destinationFolder.trim().replace(/[\/\\?%*:|"<>. ]/g, "_"); const filename = oldKey.split('/').pop();
    let newKey = (destinationFolder === "root" || destinationFolder === "") ? filename : destinationFolder + "/" + filename;
    executeS3CopyMoveOperation(oldKey, newKey, operationMode === 'move');
}

function executeS3CopyMoveOperation(sourceKey, targetKey, shouldDeleteOriginal = false) {
    s3.copyObject({ Bucket: currentBucket, CopySource: encodeURIComponent(currentBucket + '/' + sourceKey), Key: targetKey }, function(err) {
        if (err) { alert("Failed!"); return; }
        if (shouldDeleteOriginal) { s3.deleteObject({ Bucket: currentBucket, Key: sourceKey }, function() { syncAndRefreshLocalState(); }); } 
        else { syncAndRefreshLocalState(); }
    });
}

function runFolderDeleteEngine(folderPrefix) {
    closeAllOpenContextMenus();
    if(confirm("Delete folder?")) {
        s3.listObjectsV2({ Bucket: currentBucket, Prefix: folderPrefix + "/" }, function(err, data) {
            if(err || !data.Contents || data.Contents.length === 0) { loadFiles(); return; }
            let deletedCount = 0; const total = data.Contents.length;
            data.Contents.forEach(obj => { s3.deleteObject({ Bucket: currentBucket, Key: obj.Key }, function() { deletedCount++; if(deletedCount === total) syncAndRefreshLocalState(); }); });
        });
    }
}

function syncAndRefreshLocalState() { s3.listObjectsV2({ Bucket: currentBucket }, function(err, data) { if(!err) { localFilesCachedMemoryList = data.Contents || []; renderFilesFromCache(); } }); }

function renderFilesFromCache() {
    const fileList = document.getElementById('listFiles'); const searchQuery = document.getElementById('cloudSearchInput').value.toLowerCase().trim();
    fileList.innerHTML = ''; uniqueDetectedFoldersList.clear(); const itemsToRender = []; const trackingSubFoldersInCurrentDir = new Set();
    let renderedFilesTotalCount = 0; let renderedFilesTotalByteSize = 0;

    localFilesCachedMemoryList.forEach(function(content) {
        const key = content.Key;
        if(key.includes('/')) {
            const parts = key.split('/'); const baseFolderName = parts[0]; uniqueDetectedFoldersList.add(baseFolderName);
            if(currentDirectoryPath === "") { trackingSubFoldersInCurrentDir.add(baseFolderName); } 
            else if(key.startsWith(currentDirectoryPath)) { const rel = key.substring(currentDirectoryPath.length); if(rel.length > 0) itemsToRender.push({ data: content, displayKey: rel }); }
        } else { if(currentDirectoryPath === "") itemsToRender.push({ data: content, displayKey: key }); }
    });

    updateFolderDropdownUI(); let uniqueIdCounter = 0;
    
    trackingSubFoldersInCurrentDir.forEach(folderName => {
        if(searchQuery !== "" && !folderName.toLowerCase().includes(searchQuery)) return; if(currentSelectedActiveTabType !== 'all') return;
        uniqueIdCounter++; const currentMenuUniqueId = `folder_menu_${uniqueIdCounter}`;
        const li = document.createElement('li'); li.className = 'file-item folder-row-style'; li.setAttribute('onclick', `MapsToFolder('${folderName}/')`);
        li.innerHTML = `<div class="file-info-zone"><svg class="folder-svg-icon" viewBox="0 0 24 24"><path d="M10 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2h-8l-2-2z"/></svg><div class="file-name-text">${folderName}<br><span style="font-size:11px; color:#64748b;">Folder</span></div></div><div style="position: relative;"><button class="three-dot-btn" onclick="toggleContextMenu(event, '${currentMenuUniqueId}')">⋮</button><div class="context-menu-dropdown" id="${currentMenuUniqueId}"><div class="context-menu-item" onclick="event.stopPropagation(); navigateToFolder('${folderName}/')">Open</div><div class="context-menu-item" onclick="event.stopPropagation(); runRenameEngine('${folderName}/', true)">Rename</div><div class="context-menu-item" onclick="event.stopPropagation(); runFolderInfoEngine('${folderName}')">Info</div><div class="context-menu-item delete-action" onclick="event.stopPropagation(); runFolderDeleteEngine('${folderName}')">Delete</div></div></div>`;
        fileList.appendChild(li);
    });

    itemsToRender.forEach(function(item) {
        uniqueIdCounter++; const content = item.data; const originalKey = content.Key; const displayLabel = item.displayKey; const currentMenuUniqueId = `file_menu_${uniqueIdCounter}`;
        if(searchQuery !== "" && !displayLabel.toLowerCase().includes(searchQuery)) return; if(currentSelectedActiveTabType === 'photos' && !isImageFile(originalKey)) return; if(currentSelectedActiveTabType === 'videos' && !isVideoFile(originalKey)) return;
        renderedFilesTotalCount++; renderedFilesTotalByteSize += content.Size; const url = s3.getSignedUrl('getObject', { Bucket: currentBucket, Key: originalKey, Expires: 3600 });
        let typeLabel = "FILE"; if(isImageFile(originalKey)) typeLabel = "IMG"; if(isVideoFile(originalKey)) typeLabel = "VIDEO"; if(isAudioFile(originalKey)) typeLabel = "AUDIO";
        let thumbHTML = isImageFile(originalKey) ? `<img class="file-thumbnail" src="${url}">` : `<div class="file-thumbnail">${typeLabel}</div>`;
        const li = document.createElement('li'); li.className = 'file-item'; li.setAttribute('onclick', `previewFileDirectly('${originalKey}')`);
        li.innerHTML = `<div class="file-info-zone">${thumbHTML}<div class="file-name-text">${displayLabel}<br><span style="font-size: 11px; color: #64748b;">(${(content.Size/1024/1024).toFixed(2)} MB)</span></div></div><div style="position: relative;"><button class="three-dot-btn" onclick="toggleContextMenu(event, '${currentMenuUniqueId}')">⋮</button><div class="context-menu-dropdown" id="${currentMenuUniqueId}"><div class="context-menu-item" onclick="event.stopPropagation(); previewFileDirectly('${originalKey}')">View</div><a href="${url}" download="${displayLabel}" style="text-decoration:none;"><div class="context-menu-item">Download</div></a><div class="context-menu-item" onclick="event.stopPropagation(); runRenameEngine('${originalKey}', false)">Rename</div><div class="context-menu-item" onclick="event.stopPropagation(); runMoveCopyEngine('${originalKey}', 'move')">Move</div><div class="context-menu-item" onclick="event.stopPropagation(); runMoveCopyEngine('${originalKey}', 'copy')">Copy</div><div class="context-menu-item" onclick="event.stopPropagation(); runShareEngine('${originalKey}')">Share</div><div class="context-menu-item delete-action" onclick="event.stopPropagation(); deleteFile('${originalKey}')">Delete</div></div></div>`;
        fileList.appendChild(li);
    });
    document.getElementById('storageSummaryTracker').innerText = `Total Files: ${renderedFilesTotalCount} | Size: ${(renderedFilesTotalByteSize/1024/1024).toFixed(2)} MB`;
    if (fileList.innerHTML === "") fileList.innerHTML = '<li>Locker khali hai.</li>';
}

function applySearchAndFilters() { renderFilesFromCache(); }

function previewFileDirectly(fileKey) {
    closeAllOpenContextMenus(); const modal = document.getElementById('previewModal'); const modalImg = document.getElementById('previewImg'); const modalVid = document.getElementById('previewVideo'); const modalAud = document.getElementById('previewAudio'); const modalTitle = document.getElementById('modalMediaTitle');
    modalImg.style.display = "none"; modalVid.style.display = "none"; modalAud.style.display = "none"; modalTitle.innerText = fileKey.split('/').pop();
    s3.getObject({ Bucket: currentBucket, Key: fileKey }, function(err, data) {
        if (err) return; const blobUrl = URL.createObjectURL(new Blob([data.Body], { type: data.ContentType })); modal.style.display = "flex";
        if(isImageFile(fileKey)) { modalImg.src = blobUrl; modalImg.style.display = "block"; } 
        else if(isVideoFile(fileKey)) { modalVid.src = blobUrl; modalVid.style.display = "block"; modalVid.load(); modalVid.play().catch(e=>console.log(e)); } 
        else if(isAudioFile(fileKey)) { modalAud.src = blobUrl; modalAud.style.display = "block"; modalAud.load(); modalAud.play().catch(e=>console.log(e)); }
    });
}

function closePreview() { document.getElementById('previewVideo').pause(); document.getElementById('previewAudio').pause(); document.getElementById('previewModal').style.display = "none"; }
function deleteFile(fileKey) { closeAllOpenContextMenus(); if(confirm("Delete file?")) { s3.deleteObject({ Bucket: currentBucket, Key: fileKey }, function(err) { if (!err) syncAndRefreshLocalState(); }); } }

function uploadFiles() {
    const fileInput = document.getElementById('fileInput'); const files = fileInput.files; if (files.length === 0) return;
    const strategy = document.getElementById('uploadFolderTarget').value; let prefix = "";
    if (strategy === 'existing') { prefix = document.getElementById('existingFolderSelect').value + "/"; } 
    else if (strategy === 'new') { prefix = document.getElementById('newFolderNameInput').value.trim().replace(/[\/\\?%*:|"<>. ]/g, "_") + "/"; } 
    else { if(currentDirectoryPath !== "") prefix = currentDirectoryPath; }

    Array.from(files).forEach((file) => {
        s3.upload({ Bucket: currentBucket, Key: prefix + file.name, Body: file }, function() { document.getElementById('newFolderNameInput').value = ""; document.getElementById('uploadFolderTarget').value = "root"; toggleFolderInputStyle(); syncAndRefreshLocalState(); });
    });
    fileInput.value = ''; 
}

function logout() { document.getElementById('loginSection').style.display = 'block'; document.getElementById('cloudInterface').style.display = 'none'; document.getElementById('fileManager').style.display = 'none'; document.getElementById('userInput').value = ''; document.getElementById('passInput').value = ''; document.getElementById('accountSelect').value = ''; }
</script>
